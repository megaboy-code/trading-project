<div class="notification-modal" id="notificationModal">
  <div class="notification-modal-content">

    <!-- Header -->
    <div class="notification-header">
      <div class="notification-header-left">
        <span class="notification-header-title">Notifications</span>
        <span class="notification-badge" id="notificationBadge" style="display:none"></span>
      </div>
      <div class="notification-header-actions">
        <button class="notif-mark-all" id="markAllRead">Mark all read</button>
        <button class="notification-sound-toggle" id="notificationSoundToggle" title="Toggle Sound">
          <i class="fas fa-volume-xmark"></i>
        </button>
        <button class="close-notifications" id="closeNotifications">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>

    <!-- List -->
    <div class="notification-list" id="notificationList">
      <div class="notification-item empty">
        <div class="notif-icon info"><i class="fas fa-bell-slash"></i></div>
        <div class="notification-content">
          <div class="notification-title">No notifications</div>
          <div class="notification-text">You're all caught up!</div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="notification-footer">
      <span class="notification-count" id="notifCount">0 total · 0 unread</span>
      <button class="clear-all" id="clearNotifications">
        <i class="fas fa-trash"></i> Clear All
      </button>
    </div>

  </div>
</div>

<!-- Toast Container -->
<div class="notification-toast-container" id="notificationToastContainer"></div>
