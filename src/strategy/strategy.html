<!-- ================================================================
     STRATEGIES PANEL
     ================================================================ -->
<div class="panel-content strategies-panel">

    <!-- Header -->
    <div class="panel-header">
        <div class="panel-header-left">
            <i class="fas fa-robot"></i>
            <span>Strategies</span>
        </div>
        <div class="panel-header-right" style="position:relative;">
            <button class="panel-icon-btn" id="strategyMenuBtn" title="Options">
                <i class="fas fa-ellipsis-vertical"></i>
            </button>

            <!-- Settings dropdown — same pattern as calendar -->
            <div class="strat-settings-drop" id="strategySettingsDrop">
                <div class="strat-settings-label">Show Status</div>
                <div class="strat-settings-option active" data-filter="all">
                    <span class="strat-radio"></span> All
                </div>
                <div class="strat-settings-option" data-filter="running">
                    <span class="strat-radio"></span> Running
                </div>
                <div class="strat-settings-option" data-filter="paused">
                    <span class="strat-radio"></span> Paused
                </div>
                <div class="strat-settings-option" data-filter="stopped">
                    <span class="strat-radio"></span> Stopped
                </div>
                <div class="strat-settings-divider"></div>
                <div class="strat-settings-option strat-settings-action" id="strategyRefreshBtn">
                    <i class="fas fa-rotate-right"></i> Refresh Stats
                </div>
            </div>
        </div>
    </div>

    <!-- Summary stats -->
    <div class="strat-summary">
        <div class="strat-summary-stat">
            <span class="strat-summary-label">Active</span>
            <span class="strat-summary-value" id="stratStatActive">0</span>
        </div>
        <div class="strat-summary-stat">
            <span class="strat-summary-label">Trades</span>
            <span class="strat-summary-value" id="stratStatTrades">0</span>
        </div>
        <div class="strat-summary-stat">
            <span class="strat-summary-label">P&L</span>
            <span class="strat-summary-value" id="stratStatPnl">$0.00</span>
        </div>
        <div class="strat-summary-stat">
            <span class="strat-summary-label">Win %</span>
            <span class="strat-summary-value" id="stratStatWin">0%</span>
        </div>
    </div>

    <!-- Strategy list -->
    <div class="strat-list" id="strategyList"></div>

    <!-- Footer -->
    <div class="panel-footer">
        <div class="strat-footer-info">
            <i class="fas fa-circle"></i>
            <span id="stratDeployedCount">0</span> deployed
        </div>
    </div>

</div>
