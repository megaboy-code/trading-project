<!-- ================================================================
     PANEL MODULE - Right Sidebar
     ================================================================ -->
<div class="tools-panel collapsed" id="toolsPanel">

  <div class="tool-icons">

    <!-- TOP TOOLS -->
    <div class="tool-icons-top">

      <!-- Trading Control -->
      <div class="tool-icon active" data-tool="trading" data-tooltip="Trading Control">
        <i class="fas fa-sliders-h"></i>
      </div>

      <!-- Watchlist -->
      <div class="tool-icon" data-tool="watchlist" data-tooltip="Watchlist">
        <i class="fas fa-list"></i>
      </div>

      <!-- Economic Calendar -->
      <div class="tool-icon" data-tool="calendar" data-tooltip="Economic Calendar">
        <i class="fas fa-calendar-days"></i>
      </div>

      <!-- Price Alerts -->
      <div class="tool-icon" data-tool="alerts" data-tooltip="Price Alerts">
        <i class="fas fa-bell"></i>
      </div>

    </div>

    <!-- BOTTOM — Journal + Settings -->
    <div class="tool-icons-bottom">

      <div class="tool-icons-divider"></div>

      <!-- Journal — expands panel, shows mini journal -->
      <div class="tool-icon" data-tool="journal" data-tooltip="Journal">
        <i class="fas fa-book"></i>
      </div>

      <!-- Settings — opens modal -->
      <div class="tool-icon settings" data-tool="settings" data-tooltip="Settings">
        <i class="fas fa-gear"></i>
      </div>

    </div>

  </div>

  <!--@include ../watchlist/watchlist.html-->
  <!--@include ../calendar/calendar.html-->
  <!--@include ../alerts/alerts.html-->

</div>
